version: '3.8'

services:
  backend:
    build:
      context: ./backend
    ports:
      - '5000:5000'
    environment:
      - FLASK_ENV=production
      - DEBUG=False
      - CORS_ORIGINS=http://localhost:3000,http://localhost:5173
    container_name: algov-backend

  frontend:
    build:
      context: ./frontend
    ports:
      - '3000:3000'
    depends_on:
      - backend
    container_name: algov-frontend

